<!doctype html>
<html>
  <head>
    <title>Generate Icons</title>
  </head>
  <body>
    <h2>PWA Icon Generator</h2>
    <p>Right-click and save each icon below:</p>
    <div id="icons"></div>
    <script>
      const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
      const container = document.getElementById("icons");
      sizes.forEach((size) => {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, "#6366f1");
        grad.addColorStop(1, "#a855f7");

        // Rounded rect
        const r = size * 0.18;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Rupee symbol
        ctx.fillStyle = "white";
        ctx.font = `bold ${size * 0.35}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("₹", size / 2, size * 0.38);

        // Lines
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = size * 0.012;
        ctx.lineCap = "round";
        const y1 = size * 0.57,
          y2 = size * 0.63,
          y3 = size * 0.69;
        ctx.beginPath();
        ctx.moveTo(size * 0.25, y1);
        ctx.lineTo(size * 0.75, y1);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(size * 0.25, y2);
        ctx.lineTo(size * 0.6, y2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(size * 0.25, y3);
        ctx.lineTo(size * 0.5, y3);
        ctx.stroke();

        // Checkmark circle
        ctx.beginPath();
        ctx.arc(size * 0.72, size * 0.72, size * 0.1, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.lineWidth = size * 0.015;
        ctx.beginPath();
        ctx.moveTo(size * 0.66, size * 0.72);
        ctx.lineTo(size * 0.7, size * 0.76);
        ctx.lineTo(size * 0.78, size * 0.68);
        ctx.stroke();

        // Download link
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        const link = document.createElement("a");
        link.download = `icon-${size}.png`;
        link.href = canvas.toDataURL("image/png");
        link.textContent = `icon-${size}.png`;
        link.style.marginRight = "10px";
        div.appendChild(link);
        div.appendChild(canvas);
        canvas.style.width = "64px";
        canvas.style.height = "64px";
        container.appendChild(div);
      });
    </script>
  </body>
</html>
